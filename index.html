<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
            <div class="logo"></div>
            </div>

            <div class="nav-address border">
                <p class="add-first">Deliver to</p>
                <div class="add-icon">
                    <img src="location-im.jpg" alt="location">
                    <p class="add-sec">India</p>
                </div>
            </div>

            <div class="nav-search">
                <select class="search-select">
                    <option>All</option>
                </select>
                <input type="text" placeholder="Search Amazon" class="search-input">
                <div class="search-icon">
                    🔍︎
                </div>    

            </div>

            <div class="flag border">
                <div class="flag-logo">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjdFla74p63IL6nX3j5zBdwbGxCMKIa3xKRg&s" alt="flag">
                </div>
                <div>
                    <select class="flag-select">
                        <option >EN</option>
                    </select>
                </div>
            </div>

            <div class="nav-sigin border">
                <p><span>Hello, sign in</span></p>
                <p class="nav-sec">Account &amp; lists</p>
            </div>

             <div class="nav-return border">
                <p><span>Returns</span></p>
                <p class="nav-sec">&amp; Orders</p>
            </div>

            <div class="nav-cart border">
                <i>🛒</i>
                cart
            </div>
        </div>


        <div class="panel">
            <div class="panel-all border">
                <i>☰</i>
                ALL
            </div>
            <div class="panel-ops">
                <p><a href="#">Today's Deals</a></p>
                <p><a href="#">Customer Service</a></p>
                <p><a href="#">Registry</a></p>
                <p><a href="#">Gift Cards</a></p>
                <p><a href="#">Sell</a></p>
            </div>
            <div class="panel-deals border">
                Shop deals in Electronic
            </div>
        </div>
    </header>
</body>
</html>
